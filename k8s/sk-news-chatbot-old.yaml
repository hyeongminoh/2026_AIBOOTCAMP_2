# 1. API 배포 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: mihn0621/sk-news-aichatbot-api:v1
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
---
# 2. API를 UI에 연결해주는 통로 (Service)
apiVersion: v1
kind: Service
metadata:
  name: api  # UI 설정의 "http://api"와 일치해야 함!
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
---
# 3. UI 배포 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: mihn0621/sk-news-aichatbot-ui:v1
        ports:
        - containerPort: 8516
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: API_BASE_URL
          value: "http://api:8001"
---
# 4. 우리가 접속할 UI 통로 (Service)
apiVersion: v1
kind: Service
metadata:
  name: ui-service
spec:
  type: NodePort  # 미니쿠베에서 외부 접속을 위해 필요함
  selector:
    app: ui
  ports:
    - protocol: TCP
      port: 8516
      targetPort: 8516
      nodePort: 30001 # 브라우저에서 접속할 포트