apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: mihn0621/sk-news-aichatbot-ui:v1
        ports:
        - containerPort: 8516
        env:
        - name: API_BASE_URL
          value: "http://api:8001"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
spec:
  type: NodePort
  selector:
    app: ui
  ports:
    - protocol: TCP
      port: 8516
      targetPort: 8516
      nodePort: 30001
