version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8001:8001"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8516:8516"
    environment:
      - API_BASE_URL=http://api:8001
    depends_on:
      - api
